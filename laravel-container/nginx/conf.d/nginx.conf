server {
    server_name api.localhost;

    root /var/www/app/public;
    index index.php;

    client_max_body_size 225M;
    charset utf-8;
    error_page 400 403 = @main_redirect;
    error_page 404 = /404;

    merge_slashes off;
    rewrite (.*)//+(.*) $1/$2 permanent;
    rewrite ^/(.*)/$ /$1 permanent;

    set $cors_origin "";
    if ($http_origin ~* "^http://127\.0\.0\.1(:[0-9]+)?$") {
        set $cors_origin $http_origin;
    }

      add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

    location @main_redirect {
        return 418;
    }

    location / {
        if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH';
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization';
                add_header 'Access-Control-Allow-Credentials' 'true';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Length' 0;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                return 204;
            }

        try_files $uri /index.php$is_args$args;
    }

    location ~^/files/ {
        rewrite "^/files/(.*)@(.*)" /_files.php?file=$1&type=$2 break;
        rewrite "^/files/(.*)" /_files.php?file=$1 break;

        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;

        # MacOS brew
        include fastcgi_params;
        fastcgi_pass php-fpm:9000;
        # Unix fpm
    }

    location /storage/ {
        location ~/storage/[^(doc|img)] {
                return 404;
        }
        rewrite ^/storage/(doc|img)/(.*) /_storage.php?type=$1&file=$2 break;

        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;

        # MacOS brew
        include fastcgi_params;
        fastcgi_pass php-fpm:9000;
        # Unix fpm
    }

    location ~ \.php {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;

        # MacOS brew
        include fastcgi_params;
        fastcgi_pass php-fpm:9000;
    }

    listen 80;
}
